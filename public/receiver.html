<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorthernLights Cast Receiver</title>
  <style>
    body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
    cast-media-player { width: 100vw; height: 100vh; }
    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 33vh;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 1.5vh;
      line-height: 1.6;
      padding: 6px 10px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 9999;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug-panel .err { color: #f44; }
    #debug-panel .warn { color: #ff0; }
    #debug-panel .ok { color: #0f0; }
  </style>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="debug-panel"></div>
  <script>
    // ─── Global error capture (runs before anything else) ──────────
    var _rawPanel = document.getElementById('debug-panel');
    function _rawLog(msg) {
      var el = document.createElement('div');
      el.className = 'err';
      el.textContent = msg;
      if (_rawPanel) { _rawPanel.appendChild(el); _rawPanel.scrollTop = _rawPanel.scrollHeight; }
    }
    window.onerror = function(msg, src, line, col, err) {
      _rawLog('[FATAL] ' + msg + ' (' + src + ':' + line + ':' + col + ')');
      if (err && err.stack) _rawLog('[STACK] ' + err.stack);
      return false;
    };

    // ─── Main init wrapped in try-catch ────────────────────────────
    try {
      var LOG_TAG = 'NorthernLights';
      var FORCED_CAST_CODEC = 'aac';

      var context = cast.framework.CastReceiverContext.getInstance();
      var playerManager = context.getPlayerManager();

      // ─── Custom Debug Panel ────────────────────────────────────────
      var panel = document.getElementById('debug-panel');
      var MAX_LINES = 80;
      var currentAuthToken = '';

      function log(level, tag, msg) {
        var ts = ((performance.now() / 1000).toFixed(1));
        var cls = level === 'error' ? 'err' : level === 'warn' ? 'warn' : 'ok';
        var line = document.createElement('div');
        line.className = cls;
        line.textContent = '[' + ts + 's] [' + tag + '] ' + msg;
        panel.appendChild(line);
        while (panel.children.length > MAX_LINES) {
          panel.removeChild(panel.firstChild);
        }
        panel.scrollTop = panel.scrollHeight;
      }

      function withAuth(url) {
        if (!url) return url;
        try {
          var parsed = new URL(url, window.location.href);
          if (currentAuthToken && !parsed.searchParams.has('token')) {
            parsed.searchParams.set('token', currentAuthToken);
          }
          return parsed.toString();
        } catch (e) {
          return url;
        }
      }

      function applyAuth(requestInfo, resourceType) {
        if (!requestInfo) return;
        requestInfo.url = withAuth(requestInfo.url);
        requestInfo.headers = requestInfo.headers || {};
        if (currentAuthToken && !requestInfo.headers.Authorization) {
          requestInfo.headers.Authorization = 'Bearer ' + currentAuthToken;
        }
        log('ok', LOG_TAG, resourceType + ' request: ' + requestInfo.url);
      }

      var playbackConfig = new cast.framework.PlaybackConfig();
      playbackConfig.manifestRequestHandler = function(requestInfo) {
        applyAuth(requestInfo, 'Manifest');
      };
      playbackConfig.segmentRequestHandler = function(requestInfo) {
        applyAuth(requestInfo, 'Segment');
      };
      playbackConfig.manifestHandler = function(manifest, responseInfo) {
        var status = responseInfo && responseInfo.statusCode ? responseInfo.statusCode : 'unknown';
        log('ok', LOG_TAG, 'Manifest response: ' + status);
        return manifest;
      };
      playbackConfig.segmentHandler = function(segment, responseInfo) {
        var status = responseInfo && responseInfo.statusCode ? responseInfo.statusCode : 'unknown';
        log('ok', LOG_TAG, 'Segment response: ' + status);
        return segment;
      };

      // ─── Receiver Init ─────────────────────────────────────────────
      context.addEventListener(cast.framework.system.EventType.READY, function() {
        log('ok', LOG_TAG, 'Receiver started — forced codec: ' + FORCED_CAST_CODEC);
      });

      context.addEventListener(cast.framework.system.EventType.ERROR, function(e) {
        log('error', LOG_TAG, 'Receiver error: ' + JSON.stringify(e));
      });

      // ─── LOAD Interceptor ──────────────────────────────────────────
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          if (loadRequestData.media) {
            var m = loadRequestData.media;
            currentAuthToken = (m.customData && m.customData.token) || '';

            // The backend emits HLS in MPEG-TS; keep the cast path pinned to AAC-LC.
            if (m.contentId) {
              try {
                var urlObj = new URL(m.contentId, window.location.href);
                urlObj.searchParams.set('codec', FORCED_CAST_CODEC);
                if (currentAuthToken && !urlObj.searchParams.has('token')) {
                  urlObj.searchParams.set('token', currentAuthToken);
                }
                m.contentId = urlObj.toString();
                log('ok', LOG_TAG, 'Prepared HLS URL for forced AAC playback');
              } catch (e) {
                log('error', LOG_TAG, 'Failed to parse contentId URL');
              }
            }

            log('ok', LOG_TAG, 'LOAD contentId: ' + m.contentId);
            log('ok', LOG_TAG, 'LOAD contentType: ' + m.contentType);
            log('ok', LOG_TAG, 'LOAD customData: ' + JSON.stringify(m.customData));

            m.contentType = m.contentType || 'application/vnd.apple.mpegurl';
          }
          return loadRequestData;
        }
      );

      function decodeError(e) {
        if (!e) return 'Unknown error';
        var detail = '';
        if (e.detailedErrorCode) detail += ' [code=' + e.detailedErrorCode + ']';
        if (e.reason) detail += ' [reason=' + e.reason + ']';
        if (e.error) {
          var err = e.error;
          if (err.message) detail += ' ' + err.message;
          if (err.code) detail += ' (shaka=' + err.code + ')';
          if (err.category) detail += ' (cat=' + err.category + ')';
        }
        return detail || JSON.stringify(e);
      }

      playerManager.addEventListener(
        cast.framework.events.EventType.ERROR,
        function(e) {
          log('error', LOG_TAG, 'Player error: ' + decodeError(e));
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.BUFFERING,
        function(e) {
          log('ok', LOG_TAG, 'Buffering: ' + e.isBuffering);
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.MEDIA_STATUS,
        function(e) {
          if (e.mediaStatus) {
            log('ok', LOG_TAG, 'State: ' + e.mediaStatus.playerState +
              (e.mediaStatus.idleReason ? ' (' + e.mediaStatus.idleReason + ')' : ''));
          }
        }
      );

      // ─── Start receiver ────────────────────────────────────────────
      log('ok', LOG_TAG, 'Starting receiver...');
      context.start({ playbackConfig: playbackConfig });
      log('ok', LOG_TAG, 'context.start() returned OK');

    } catch (initError) {
      _rawLog('[INIT ERROR] ' + initError.message);
      if (initError.stack) _rawLog('[INIT STACK] ' + initError.stack);
    }
  </script>
</body>
</html>
