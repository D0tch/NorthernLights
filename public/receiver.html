<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorthernLights Cast Receiver</title>
  <style>
    :root {
      --bg: #030208;
      --surface: rgba(8, 6, 22, 0.48);
      --surface-strong: rgba(8, 6, 22, 0.62);
      --border: rgba(255, 255, 255, 0.075);
      --border-bright: rgba(34, 201, 131, 0.18);
      --text: #edf8f4;
      --text-soft: #a8a9ba;
      --text-muted: #66677b;
      --green: #22c983;
      --teal: #2dd4bf;
      --blue: #0ea5e9;
      --rose: #f43f5e;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
      --radius-xl: 38px;
      --radius-lg: 28px;
      --radius-pill: 999px;
      --font-display: sans-serif;
      --font-body: sans-serif;
      --progress: 0%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 12% 24%, rgba(34, 201, 131, 0.14), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(14, 165, 233, 0.11), transparent 30%),
        radial-gradient(circle at 56% 96%, rgba(244, 63, 94, 0.07), transparent 30%),
        var(--bg);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0 20%, rgba(34, 201, 131, 0.035) 30%, transparent 44%),
        linear-gradient(72deg, transparent 0 48%, rgba(14, 165, 233, 0.03) 60%, transparent 74%);
      opacity: 0.64;
      pointer-events: none;
    }

    body::after {
      display: none;
    }

    cast-media-player {
      position: fixed;
      left: -10000px !important;
      top: -10000px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      pointer-events: none !important;
      z-index: -1 !important;
      overflow: hidden !important;
      clip-path: inset(50%) !important;
    }

    .shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      width: 100%;
      height: 100%;
      padding: 5vh 5vw;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 4vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 5vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1vw;
      color: var(--text-soft);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: '';
      position: absolute;
      left: -20%;
      right: -20%;
      height: 12px;
      border-radius: var(--radius-pill);
    }

    .brand-mark::before {
      top: 13px;
      background: linear-gradient(90deg, transparent, rgba(34, 201, 131, 0.76), transparent);
      transform: rotate(-16deg);
    }

    .brand-mark::after {
      top: 22px;
      background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.62), transparent);
      transform: rotate(14deg);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 0.25vh;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 2.35vh;
      line-height: 1;
      letter-spacing: -0.035em;
      color: var(--text);
    }

    .brand-subtitle {
      font-size: 1.2vh;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.7vw;
      padding: 0.9vh 1vw;
      min-width: 0;
      border-radius: var(--radius-pill);
      color: var(--text-soft);
      font-size: 1.45vh;
      background: rgba(255, 255, 255, 0.038);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: var(--radius-pill);
      background: var(--green);
      box-shadow: 0 0 18px rgba(34, 201, 131, 0.62);
      flex: 0 0 auto;
    }

    .stage {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(300px, 27vw) minmax(0, 1fr);
      gap: 3.4vw;
      align-items: center;
      max-width: 1420px;
      width: 100%;
      justify-self: center;
    }

    .cover-wrap {
      width: min(27vw, 440px);
      aspect-ratio: 1;
      justify-self: end;
      border-radius: var(--radius-xl);
      padding: 10px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.025)),
        rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .cover {
      width: 100%;
      height: 100%;
      border-radius: calc(var(--radius-xl) - 12px);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.035);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.055);
    }

    #cover-art,
    #cover-fallback {
      width: 100%;
      height: 100%;
    }

    #cover-art {
      display: block;
      object-fit: cover;
    }

    #cover-fallback {
      display: none;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 12vh;
      color: rgba(237, 248, 244, 0.88);
      background:
        radial-gradient(circle at 30% 24%, rgba(34, 201, 131, 0.28), transparent 34%),
        radial-gradient(circle at 70% 76%, rgba(14, 165, 233, 0.22), transparent 34%),
        rgba(255, 255, 255, 0.035);
    }

    .content {
      min-width: 0;
      max-width: 760px;
      padding: 4.2vh 3.2vw;
      border-radius: var(--radius-xl);
      background: linear-gradient(145deg, rgba(8, 6, 22, 0.52), rgba(8, 6, 22, 0.34));
      border: 1px solid var(--border);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.045);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.65vw;
      margin-bottom: 2vh;
      color: var(--text-muted);
      font-size: 1.35vh;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .kicker-line {
      width: 4.2vw;
      height: 1px;
      background: linear-gradient(90deg, var(--green), transparent);
      opacity: 0.7;
    }

    #track-title {
      margin: 0 0 1.4vh;
      max-width: 100%;
      font-family: var(--font-display);
      font-size: clamp(40px, 6.2vh, 82px);
      line-height: 0.94;
      letter-spacing: -0.055em;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      text-wrap: balance;
    }

    #track-artist {
      margin: 0 0 0.6vh;
      font-size: clamp(21px, 2.7vh, 34px);
      color: var(--text-soft);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-album {
      margin: 0;
      font-size: 1.65vh;
      color: var(--text-muted);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .progress {
      margin-top: 4vh;
    }

    .progress-times {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1vh;
      color: var(--text-muted);
      font-size: 1.35vh;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      position: relative;
      height: 7px;
      overflow: hidden;
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.045);
    }

    .progress-track::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--progress);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--teal), var(--blue));
      box-shadow: 0 0 18px rgba(34, 201, 131, 0.3);
    }

    .queue-strip {
      justify-self: center;
      width: min(940px, 82vw);
      min-height: 8vh;
      padding: 1.25vh 1.25vw;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1.2vw;
      align-items: center;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.30), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .queue-label {
      color: var(--text-muted);
      font-size: 1.15vh;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #up-next-list {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 1.15vw;
      overflow: hidden;
    }

    .queue-item {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 0.55vw;
      color: var(--text-soft);
      font-size: 1.5vh;
      white-space: nowrap;
    }

    .queue-index {
      color: var(--green);
      font-family: var(--font-display);
      font-size: 1.65vh;
      letter-spacing: -0.03em;
      opacity: 0.9;
    }

    .queue-copy {
      min-width: 0;
      display: flex;
      gap: 0.35vw;
      overflow: hidden;
    }

    .queue-name,
    .queue-artist {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-name {
      color: var(--text);
      max-width: 17vw;
    }

    .queue-artist {
      color: var(--text-muted);
      max-width: 11vw;
    }

    .queue-empty {
      color: var(--text-muted);
      font-size: 1.45vh;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #debug-toggle {
      position: fixed;
      right: 2vw;
      bottom: 2vh;
      z-index: 50;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 0.85vh 0.9vw;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.032);
      border: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 1.15vh;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .debug-panel {
      position: fixed;
      left: 2vw;
      right: 2vw;
      bottom: 6.2vh;
      max-height: 28vh;
      padding: 1.4vh 1.2vw;
      overflow-y: auto;
      z-index: 49;
      border-radius: 22px;
      color: var(--text-soft);
      background: rgba(4, 2, 14, 0.76);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1.2vh;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .debug-panel.is-hidden {
      display: none;
    }

    .debug-panel .err { color: #ff8f8f; }
    .debug-panel .warn { color: #f9dc7b; }
    .debug-panel .ok { color: #9ce5bd; }

    @media (max-aspect-ratio: 16/10) {
      .shell {
        padding: 4vh 4vw;
      }

      .stage {
        grid-template-columns: 1fr;
        gap: 3vh;
      }

      .cover-wrap {
        width: min(44vh, 62vw);
        justify-self: center;
      }

      .content {
        justify-self: center;
        width: min(820px, 86vw);
        text-align: center;
      }

      .kicker {
        justify-content: center;
      }

      #track-title {
        -webkit-line-clamp: 2;
      }
    }
  </style>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <cast-media-player></cast-media-player>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <div class="brand-title">Aurora</div>
          <div class="brand-subtitle">NorthernLights Receiver</div>
        </div>
      </div>

      <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-chip">Idle</span>
      </div>
    </header>

    <main class="stage">
      <section class="cover-wrap" aria-label="Album artwork">
        <div class="cover">
          <img id="cover-art" alt="" />
          <div id="cover-fallback">A</div>
        </div>
      </section>

      <section class="content" aria-label="Now playing">
        <div class="kicker">
          <span class="kicker-line" aria-hidden="true"></span>
          <span id="meta-kicker">Ready for playback</span>
        </div>
        <h1 id="track-title">Aurora Receiver</h1>
        <p id="track-artist">Waiting for media</p>
        <p id="track-album">Start casting from Aurora.</p>

        <div class="progress">
          <div class="progress-times">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
          </div>
          <div class="progress-track" id="progress-bar"></div>
        </div>
      </section>
    </main>

    <aside class="queue-strip" aria-label="Up next">
      <div class="queue-label">Up Next</div>
      <div id="up-next-list">
        <div class="queue-empty">Queue appears here once playback starts.</div>
      </div>
    </aside>
  </div>

  <button id="debug-toggle" type="button">Logs</button>
  <div id="debug-panel" class="debug-panel is-hidden"></div>

  <script>
    var _rawPanel = document.getElementById('debug-panel');
    function _rawLog(msg) {
      if (!_rawPanel) return;
      _rawPanel.classList.remove('is-hidden');
      var el = document.createElement('div');
      el.className = 'err';
      el.textContent = msg;
      _rawPanel.appendChild(el);
      _rawPanel.scrollTop = _rawPanel.scrollHeight;
    }
    window.onerror = function(msg, src, line, col, err) {
      _rawLog('[FATAL] ' + msg + ' (' + src + ':' + line + ':' + col + ')');
      if (err && err.stack) _rawLog('[STACK] ' + err.stack);
      return false;
    };

    try {
      var LOG_TAG = 'NorthernLights';
      var FORCED_CAST_CODEC = 'aac';

      var context = cast.framework.CastReceiverContext.getInstance();
      var playerManager = context.getPlayerManager();
      var queueManager = playerManager.getQueueManager();

      var ui = {
        title: document.getElementById('track-title'),
        artist: document.getElementById('track-artist'),
        album: document.getElementById('track-album'),
        coverArt: document.getElementById('cover-art'),
        coverFallback: document.getElementById('cover-fallback'),
        currentTime: document.getElementById('current-time'),
        durationTime: document.getElementById('duration-time'),
        progressBar: document.getElementById('progress-bar'),
        statusChip: document.getElementById('status-chip'),
        metaKicker: document.getElementById('meta-kicker'),
        upNextList: document.getElementById('up-next-list'),
        debugPanel: document.getElementById('debug-panel'),
        debugToggle: document.getElementById('debug-toggle')
      };

      var MAX_LINES = 80;
      var VERBOSE_NETWORK_LOGS = false;
      var UI_PROGRESS_INTERVAL_MS = 2000;
      var currentAuthToken = '';
      var currentPlayerState = 'IDLE';
      var lastRender = {
        title: '',
        artist: '',
        album: '',
        imageUrl: '',
        currentSecond: -1,
        durationSecond: -1,
        progressBucket: -1,
        statusCopy: '',
        queueKey: ''
      };

      function log(level, tag, msg) {
        var ts = ((performance.now() / 1000).toFixed(1));
        var cls = level === 'error' ? 'err' : level === 'warn' ? 'warn' : 'ok';
        var panelHidden = !ui.debugPanel || ui.debugPanel.classList.contains('is-hidden');

        // Keep OK-level request chatter out of the DOM unless the panel is open.
        // DOM logging on Cast devices is surprisingly expensive and can stall the receiver UI.
        if (panelHidden && level === 'ok') return;

        var line = document.createElement('div');
        line.className = cls;
        line.textContent = '[' + ts + 's] [' + tag + '] ' + msg;
        ui.debugPanel.appendChild(line);
        while (ui.debugPanel.children.length > MAX_LINES) {
          ui.debugPanel.removeChild(ui.debugPanel.firstChild);
        }
        ui.debugPanel.scrollTop = ui.debugPanel.scrollHeight;
      }

      function setDebugVisible(visible) {
        if (!ui.debugPanel) return;
        ui.debugPanel.classList.toggle('is-hidden', !visible);
      }

      ui.debugToggle.addEventListener('click', function() {
        setDebugVisible(ui.debugPanel.classList.contains('is-hidden'));
      });

      function postServerLog(level, message, detail) {
        if (!currentAuthToken) return;
        try {
          fetch('/api/cast/log?token=' + encodeURIComponent(currentAuthToken), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              source: 'cast-receiver',
              session: FORCED_CAST_CODEC,
              level: level,
              message: message,
              detail: detail || ''
            })
          }).catch(function() {});
        } catch (e) {}
      }

      function safeStringify(value) {
        var seen = [];
        try {
          var serialized = JSON.stringify(value, function(key, val) {
            if (typeof val === 'function') return undefined;
            if (val instanceof Error) {
              return {
                name: val.name,
                message: val.message,
                stack: val.stack,
                code: val.code,
                category: val.category,
                severity: val.severity,
                data: val.data
              };
            }
            if (val && typeof val === 'object') {
              if (seen.indexOf(val) >= 0) return '[Circular]';
              seen.push(val);
            }
            return val;
          });
          return (serialized || String(value)).slice(0, 2500);
        } catch (e) {
          try {
            return String(value);
          } catch (stringError) {
            return 'Unserializable error';
          }
        }
      }

      function logAndPost(level, tag, msg) {
        log(level, tag, msg);
        if (level !== 'ok' || VERBOSE_NETWORK_LOGS) {
          postServerLog(level, '[' + tag + '] ' + msg);
        }
      }

      function suppressDefaultCastUi() {
        var defaultPlayer = document.querySelector('cast-media-player');
        if (!defaultPlayer) return;
        defaultPlayer.setAttribute('aria-hidden', 'true');
        defaultPlayer.style.setProperty('left', '-10000px', 'important');
        defaultPlayer.style.setProperty('top', '-10000px', 'important');
        defaultPlayer.style.setProperty('width', '1px', 'important');
        defaultPlayer.style.setProperty('height', '1px', 'important');
        defaultPlayer.style.setProperty('opacity', '0', 'important');
        defaultPlayer.style.setProperty('pointer-events', 'none', 'important');
        defaultPlayer.style.setProperty('z-index', '-1', 'important');
        defaultPlayer.style.setProperty('overflow', 'hidden', 'important');
        defaultPlayer.style.setProperty('clip-path', 'inset(50%)', 'important');
      }

      function withAuth(url) {
        if (!url) return url;
        try {
          var parsed = new URL(url, window.location.href);
          if (currentAuthToken && !parsed.searchParams.has('token')) {
            parsed.searchParams.set('token', currentAuthToken);
          }
          return parsed.toString();
        } catch (e) {
          return url;
        }
      }

      function applyAuth(requestInfo, resourceType) {
        if (!requestInfo) return;
        requestInfo.url = withAuth(requestInfo.url);
        requestInfo.headers = requestInfo.headers || {};
        if (currentAuthToken && !requestInfo.headers.Authorization) {
          requestInfo.headers.Authorization = 'Bearer ' + currentAuthToken;
        }
        if (VERBOSE_NETWORK_LOGS) {
          logAndPost('ok', LOG_TAG, resourceType + ' request');
        }
      }

      function formatTime(value) {
        if (!isFinite(value) || value < 0) return '0:00';
        var totalSeconds = Math.floor(value);
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return minutes + ':' + String(seconds).padStart(2, '0');
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getMetadata(mediaInfo) {
        return (mediaInfo && mediaInfo.metadata) || {};
      }

      function getImageUrl(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        if (metadata && metadata.images && metadata.images.length && metadata.images[0] && metadata.images[0].url) {
          return metadata.images[0].url;
        }
        return '';
      }

      function getDisplayTitle(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        return metadata.title || 'Unknown Title';
      }

      function getDisplayArtist(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        return metadata.artist || 'Unknown Artist';
      }

      function getDisplayAlbum(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        return metadata.albumName || '';
      }

      function setArtwork(imageUrl, title) {
        if (lastRender.imageUrl === imageUrl) return;
        lastRender.imageUrl = imageUrl;

        if (imageUrl) {
          ui.coverArt.src = imageUrl;
          ui.coverArt.style.display = 'block';
          ui.coverFallback.style.display = 'none';
        } else {
          ui.coverArt.removeAttribute('src');
          ui.coverArt.style.display = 'none';
          ui.coverFallback.textContent = (title || 'A').trim().charAt(0).toUpperCase() || 'A';
          ui.coverFallback.style.display = 'flex';
        }
      }

      function getStatusCopy() {
        if (currentPlayerState === 'BUFFERING') return 'Buffering';
        if (currentPlayerState === 'PLAYING') return 'Playing';
        if (currentPlayerState === 'PAUSED') return 'Paused';
        if (currentPlayerState === 'LOADING') return 'Loading';
        return 'Idle';
      }

      function buildQueueKey(items, currentIndex) {
        var parts = [String(currentIndex), String(items.length)];
        for (var i = currentIndex + 1; i < items.length && parts.length < 8; i += 1) {
          var mediaInfo = items[i].media || {};
          var metadata = getMetadata(mediaInfo);
          parts.push(String(items[i].itemId || i));
          parts.push(metadata.title || '');
          parts.push(metadata.artist || '');
        }
        return parts.join('|');
      }

      function renderQueue() {
        var items = queueManager ? queueManager.getItems() : [];
        var currentIndex = queueManager ? queueManager.getCurrentItemIndex() : -1;
        var queueKey = buildQueueKey(items, currentIndex);
        var nextItems = [];
        var i;

        if (lastRender.queueKey === queueKey) return;
        lastRender.queueKey = queueKey;

        for (i = currentIndex + 1; i < items.length && nextItems.length < 3; i += 1) {
          nextItems.push(items[i]);
        }

        ui.upNextList.innerHTML = '';

        if (!nextItems.length) {
          var empty = document.createElement('div');
          empty.className = 'queue-empty';
          empty.textContent = items.length ? 'No further tracks queued.' : 'Queue appears here once playback starts.';
          ui.upNextList.appendChild(empty);
          return;
        }

        nextItems.forEach(function(item, offset) {
          var mediaInfo = item.media || {};
          var row = document.createElement('div');
          row.className = 'queue-item';
          row.innerHTML =
            '<div class="queue-index">' + String(currentIndex + offset + 2).padStart(2, '0') + '</div>' +
            '<div class="queue-copy">' +
              '<div class="queue-name"></div>' +
              '<div class="queue-artist"></div>' +
            '</div>';
          row.querySelector('.queue-name').textContent = getDisplayTitle(mediaInfo);
          row.querySelector('.queue-artist').textContent = 'by ' + getDisplayArtist(mediaInfo);
          ui.upNextList.appendChild(row);
        });
      }

      function syncUi(force) {
        var mediaInfo = playerManager.getMediaInformation();
        var title = getDisplayTitle(mediaInfo);
        var artist = getDisplayArtist(mediaInfo);
        var album = getDisplayAlbum(mediaInfo);
        var imageUrl = getImageUrl(mediaInfo);
        var currentTime = playerManager.getCurrentTimeSec ? playerManager.getCurrentTimeSec() : 0;
        var duration = playerManager.getDurationSec ? playerManager.getDurationSec() : NaN;
        var progress = (!isFinite(duration) || duration <= 0) ? 0 : clamp((currentTime / duration) * 100, 0, 100);
        var statusCopy = getStatusCopy();
        var currentSecond = Math.floor(currentTime || 0);
        var durationSecond = Math.floor(duration || 0);
        var progressBucket = Math.floor(progress * 4); // quarter-percent buckets

        if (force || lastRender.title !== title) {
          ui.title.textContent = title || 'Aurora Receiver';
          lastRender.title = title;
        }
        if (force || lastRender.artist !== artist) {
          ui.artist.textContent = artist || 'Waiting for media';
          lastRender.artist = artist;
        }
        if (force || lastRender.album !== album) {
          ui.album.textContent = album || 'Start casting from Aurora.';
          lastRender.album = album;
        }

        if (force || lastRender.currentSecond !== currentSecond) {
          ui.currentTime.textContent = formatTime(currentTime);
          lastRender.currentSecond = currentSecond;
        }
        if (force || lastRender.durationSecond !== durationSecond) {
          ui.durationTime.textContent = formatTime(duration);
          lastRender.durationSecond = durationSecond;
        }
        if (force || lastRender.progressBucket !== progressBucket) {
          ui.progressBar.style.setProperty('--progress', progress.toFixed(2) + '%');
          lastRender.progressBucket = progressBucket;
        }
        if (force || lastRender.statusCopy !== statusCopy) {
          ui.statusChip.textContent = statusCopy;
          ui.metaKicker.textContent = statusCopy === 'Playing'
            ? 'Now streaming'
            : statusCopy === 'Buffering'
              ? 'Buffering'
              : statusCopy === 'Paused'
                ? 'Paused'
                : 'Ready';
          lastRender.statusCopy = statusCopy;
        }

        setArtwork(imageUrl, title);
        renderQueue();
      }

      function postReceiverHeartbeat(reason) {
        if (!currentAuthToken) return;
        try {
          var mediaInfo = playerManager.getMediaInformation();
          var title = getDisplayTitle(mediaInfo);
          var currentTime = playerManager.getCurrentTimeSec ? playerManager.getCurrentTimeSec() : 0;
          var duration = playerManager.getDurationSec ? playerManager.getDurationSec() : 0;
          postServerLog(
            'ok',
            '[' + LOG_TAG + '] Receiver heartbeat: ' + reason,
            'state=' + currentPlayerState +
              ' title=' + title +
              ' time=' + Math.floor(currentTime || 0) +
              ' duration=' + Math.floor(duration || 0) +
              ' overlay=active'
          );
        } catch (e) {
          postServerLog('warn', '[' + LOG_TAG + '] Receiver heartbeat failed', safeStringify(e));
        }
      }

      var playbackConfig = new cast.framework.PlaybackConfig();
      playbackConfig.manifestRequestHandler = function(requestInfo) {
        applyAuth(requestInfo, 'Manifest');
      };
      playbackConfig.segmentRequestHandler = function(requestInfo) {
        applyAuth(requestInfo, 'Segment');
      };
      playbackConfig.manifestHandler = function(manifest, responseInfo) {
        if (VERBOSE_NETWORK_LOGS) {
          var detail = responseInfo && responseInfo.headers ? ' headers received' : ' response received';
          logAndPost('ok', LOG_TAG, 'Manifest' + detail);
        }
        return manifest;
      };
      playbackConfig.segmentHandler = function(segment, responseInfo) {
        if (VERBOSE_NETWORK_LOGS) {
          var detail = responseInfo && responseInfo.headers ? ' headers received' : ' response received';
          logAndPost('ok', LOG_TAG, 'Segment' + detail);
        }
        return segment;
      };

      context.addEventListener(cast.framework.system.EventType.READY, function() {
        suppressDefaultCastUi();
        logAndPost('ok', LOG_TAG, 'Receiver started — forced codec: ' + FORCED_CAST_CODEC);
        syncUi(true);
      });

      context.addEventListener(cast.framework.system.EventType.ERROR, function(e) {
        setDebugVisible(true);
        suppressDefaultCastUi();
        logAndPost('error', LOG_TAG, 'Receiver error: ' + safeStringify(e));
      });

      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          function normalizeMedia(media) {
            if (!media) return;
            currentAuthToken = (media.customData && media.customData.token) || currentAuthToken || '';

            if (media.contentId) {
              try {
                var urlObj = new URL(media.contentId, window.location.href);
                urlObj.searchParams.set('codec', FORCED_CAST_CODEC);
                if (currentAuthToken && !urlObj.searchParams.has('token')) {
                  urlObj.searchParams.set('token', currentAuthToken);
                }
                media.contentId = urlObj.toString();
              } catch (e) {
                logAndPost('error', LOG_TAG, 'Failed to parse contentId URL');
              }
            }

            media.contentType = media.contentType || 'application/vnd.apple.mpegurl';
          }

          if (loadRequestData.media) {
            normalizeMedia(loadRequestData.media);
            logAndPost('ok', LOG_TAG, 'Prepared HLS URL for forced AAC playback');
            logAndPost('ok', LOG_TAG, 'LOAD contentId: ' + loadRequestData.media.contentId);
            logAndPost('ok', LOG_TAG, 'LOAD contentType: ' + loadRequestData.media.contentType);
          }

          if (loadRequestData.queueData && loadRequestData.queueData.items) {
            loadRequestData.queueData.items.forEach(function(item) {
              if (item && item.media) normalizeMedia(item.media);
            });
            logAndPost('ok', LOG_TAG, 'LOAD queue items: ' + loadRequestData.queueData.items.length);
          }

          currentPlayerState = 'LOADING';
          lastRender.queueKey = '';
          suppressDefaultCastUi();
          postReceiverHeartbeat('load');
          syncUi(true);
          return loadRequestData;
        }
      );

      function decodeError(e) {
        if (!e) return 'Unknown error';
        var detail = [];
        function add(label, value) {
          if (value === undefined || value === null || value === '') return;
          detail.push(label + '=' + value);
        }

        add('code', e.detailedErrorCode);
        if (e.reason) add('reason', e.reason);
        if (e.error) {
          var err = e.error;
          add('message', err.message);
          add('shaka', err.code);
          add('category', err.category);
          add('severity', err.severity);
          if (err.data) add('data', safeStringify(err.data));
        }
        if (e.mediaError) add('mediaError', safeStringify(e.mediaError));
        if (!detail.length) add('event', safeStringify(e));
        return detail.join(' ');
      }

      playerManager.addEventListener(
        cast.framework.events.EventType.ERROR,
        function(e) {
          currentPlayerState = 'IDLE';
          setDebugVisible(true);
          suppressDefaultCastUi();
          logAndPost('error', LOG_TAG, 'Player error: ' + decodeError(e));
          syncUi(true);
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.BUFFERING,
        function(e) {
          currentPlayerState = e.isBuffering ? 'BUFFERING' : currentPlayerState;
          suppressDefaultCastUi();
          logAndPost('ok', LOG_TAG, 'Buffering: ' + e.isBuffering);
          syncUi(true);
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.MEDIA_STATUS,
        function(e) {
          if (e.mediaStatus) {
            currentPlayerState = e.mediaStatus.playerState || currentPlayerState;
            logAndPost('ok', LOG_TAG, 'State: ' + e.mediaStatus.playerState +
              (e.mediaStatus.idleReason ? ' (' + e.mediaStatus.idleReason + ')' : ''));
            lastRender.queueKey = '';
            suppressDefaultCastUi();
            postReceiverHeartbeat('media-status');
            syncUi(true);
          }
        }
      );

      setInterval(function() {
        suppressDefaultCastUi();
        syncUi(false);
      }, UI_PROGRESS_INTERVAL_MS);

      setInterval(function() {
        if (currentPlayerState === 'PLAYING' || currentPlayerState === 'BUFFERING') {
          postReceiverHeartbeat('interval');
        }
      }, 60000);

      suppressDefaultCastUi();
      logAndPost('ok', LOG_TAG, 'Starting receiver...');
      context.start({ playbackConfig: playbackConfig });
      logAndPost('ok', LOG_TAG, 'context.start() returned OK');
    } catch (initError) {
      _rawLog('[INIT ERROR] ' + initError.message);
      if (initError.stack) _rawLog('[INIT STACK] ' + initError.stack);
    }
  </script>
</body>
</html>
