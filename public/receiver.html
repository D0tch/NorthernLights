<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Cast Receiver</title>
  <style>
    :root {
      --bg: #030208;
      --surface: rgba(8, 6, 22, 0.48);
      --surface-strong: rgba(8, 6, 22, 0.62);
      --border: rgba(255, 255, 255, 0.075);
      --border-bright: rgba(34, 201, 131, 0.18);
      --text: #edf8f4;
      --text-soft: #a8a9ba;
      --text-muted: #66677b;
      --green: #22c983;
      --teal: #2dd4bf;
      --blue: #0ea5e9;
      --rose: #f43f5e;
      --shadow: 0 22px 58px rgba(0, 0, 0, 0.42);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-pill: 999px;
      --font-display: sans-serif;
      --font-body: sans-serif;
      --progress: 0%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 12% 24%, rgba(34, 201, 131, 0.14), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(14, 165, 233, 0.11), transparent 30%),
        radial-gradient(circle at 56% 96%, rgba(244, 63, 94, 0.07), transparent 30%),
        var(--bg);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(115deg, rgba(3, 2, 8, 0.14), transparent 28%, rgba(3, 2, 8, 0.36)),
        linear-gradient(72deg, transparent 0 48%, rgba(14, 165, 233, 0.035) 60%, transparent 74%);
      opacity: 0.86;
      pointer-events: none;
    }

    body::after {
      display: none;
    }

    #aurora-cast-media,
    cast-media-player {
      position: fixed;
      left: -10000px !important;
      top: -10000px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      pointer-events: none !important;
      z-index: -1 !important;
      overflow: hidden !important;
      clip-path: inset(50%) !important;
    }

    .ambient-art {
      position: fixed;
      inset: -7%;
      z-index: 0;
      width: 114%;
      height: 114%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 700ms ease;
      pointer-events: none;
    }

    body.has-art .ambient-art {
      opacity: 0.08;
    }

    .shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      width: 100%;
      height: 100%;
      padding: clamp(40px, 5vh, 72px) clamp(56px, 5vw, 96px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(28px, 4vh, 48px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 5vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1vw;
      color: var(--text-soft);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: '';
      position: absolute;
      left: -20%;
      right: -20%;
      height: 12px;
      border-radius: var(--radius-pill);
    }

    .brand-mark::before {
      top: 13px;
      background: linear-gradient(90deg, transparent, rgba(34, 201, 131, 0.76), transparent);
      transform: rotate(-16deg);
    }

    .brand-mark::after {
      top: 22px;
      background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.62), transparent);
      transform: rotate(14deg);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 0.25vh;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 2.35vh;
      line-height: 1;
      letter-spacing: 0;
      color: var(--text);
    }

    .brand-subtitle {
      font-size: 1.2vh;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.7vw;
      padding: 0.9vh 1vw;
      min-width: 0;
      border-radius: var(--radius-pill);
      color: var(--text-soft);
      font-size: 1.45vh;
      background: rgba(255, 255, 255, 0.038);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: var(--radius-pill);
      background: var(--green);
      box-shadow: 0 0 18px rgba(34, 201, 131, 0.62);
      flex: 0 0 auto;
    }

    .shell[data-player-state="APP_LOADING"] .status-dot,
    .shell[data-player-state="BUFFERING"] .status-dot,
    .shell[data-player-state="LOADING"] .status-dot,
    .shell[data-player-state="SEEKING"] .status-dot {
      background: var(--teal);
      animation: receiver-pulse 1.1s ease-in-out infinite;
    }

    .shell[data-player-state="PAUSED"] .status-dot {
      background: var(--text-muted);
      box-shadow: none;
    }

    .shell[data-player-state="IDLE"] .status-dot {
      background: rgba(255, 255, 255, 0.22);
      box-shadow: none;
    }

    .shell[data-player-state="ERROR"] .status-dot {
      background: var(--rose);
      box-shadow: 0 0 18px rgba(244, 63, 94, 0.42);
    }

    .stage {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(300px, 27vw) minmax(0, 1fr);
      gap: 3.4vw;
      align-items: center;
      max-width: 1420px;
      width: 100%;
      justify-self: center;
    }

    .cover-wrap {
      width: min(27vw, 440px);
      aspect-ratio: 1;
      justify-self: end;
      border-radius: var(--radius-xl);
      padding: 9px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.025)),
        rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .cover {
      width: 100%;
      height: 100%;
      border-radius: calc(var(--radius-xl) - 12px);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.035);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.055);
    }

    #cover-art,
    #cover-fallback {
      width: 100%;
      height: 100%;
    }

    #cover-art {
      display: block;
      object-fit: cover;
    }

    #cover-fallback {
      display: none;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 12vh;
      color: rgba(237, 248, 244, 0.88);
      background:
        radial-gradient(circle at 30% 24%, rgba(34, 201, 131, 0.28), transparent 34%),
        radial-gradient(circle at 70% 76%, rgba(14, 165, 233, 0.22), transparent 34%),
        rgba(255, 255, 255, 0.035);
    }

    .content {
      min-width: 0;
      max-width: 760px;
      padding: clamp(34px, 4.2vh, 56px) clamp(34px, 3.2vw, 54px);
      border-radius: var(--radius-xl);
      background: linear-gradient(145deg, rgba(8, 6, 22, 0.58), rgba(8, 6, 22, 0.34));
      border: 1px solid var(--border);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.045);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.65vw;
      margin-bottom: 2vh;
      color: var(--text-muted);
      font-size: 1.35vh;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .kicker-line {
      width: 4.2vw;
      height: 1px;
      background: linear-gradient(90deg, var(--green), transparent);
      opacity: 0.7;
    }

    #track-title {
      margin: 0 0 1.4vh;
      max-width: 100%;
      font-family: var(--font-display);
      font-size: clamp(40px, 6.2vh, 82px);
      line-height: 0.94;
      letter-spacing: 0;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      text-wrap: balance;
    }

    #track-artist {
      margin: 0 0 0.6vh;
      font-size: clamp(21px, 2.7vh, 34px);
      color: var(--text-soft);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-album {
      margin: 0;
      font-size: 1.65vh;
      color: var(--text-muted);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-banner {
      display: inline-flex;
      align-items: center;
      gap: 0.75vw;
      margin-top: 2.2vh;
      padding: 0.9vh 1vw;
      min-height: 3.9vh;
      border-radius: var(--radius-pill);
      color: var(--text-soft);
      font-size: 1.35vh;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 220ms ease, transform 220ms ease, border-color 220ms ease;
      pointer-events: none;
    }

    .state-banner.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .state-spinner {
      width: 1.45vh;
      height: 1.45vh;
      border-radius: var(--radius-pill);
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--teal);
      animation: receiver-spin 0.8s linear infinite;
    }

    .state-banner[data-state="PAUSED"] .state-spinner,
    .state-banner[data-state="IDLE"] .state-spinner,
    .state-banner[data-state="ERROR"] .state-spinner {
      display: none;
    }

    .state-banner[data-state="ERROR"] {
      color: #ffc4cf;
      border-color: rgba(244, 63, 94, 0.28);
      background: rgba(244, 63, 94, 0.08);
    }

    .idle-tip {
      margin-top: 1.4vh;
      min-height: 2.4vh;
      color: var(--text-muted);
      font-size: 1.45vh;
      line-height: 1.45;
    }

    .shell[data-player-state="PLAYING"] .idle-tip,
    .shell[data-player-state="BUFFERING"] .idle-tip,
    .shell[data-player-state="SEEKING"] .idle-tip {
      display: none;
    }

    .progress {
      margin-top: 4vh;
    }

    .progress-times {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1vh;
      color: var(--text-muted);
      font-size: 1.35vh;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      position: relative;
      height: 7px;
      overflow: hidden;
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.045);
    }

    .progress-track::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--progress);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--teal), var(--blue));
      box-shadow: 0 0 18px rgba(34, 201, 131, 0.3);
    }

    .shell[data-player-state="APP_LOADING"] .progress-track::after,
    .shell[data-player-state="BUFFERING"] .progress-track::after,
    .shell[data-player-state="LOADING"] .progress-track::after,
    .shell[data-player-state="SEEKING"] .progress-track::after {
      content: '';
      position: absolute;
      inset: 0;
      width: 34%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.34), transparent);
      animation: receiver-shimmer 1.4s ease-in-out infinite;
    }

    .state-banner[data-state="PAUSED"]::before {
      content: '||';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8vh;
      height: 1.8vh;
      border-radius: var(--radius-pill);
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      font-size: 1.05vh;
      letter-spacing: 0;
    }

    .shell.is-dimmed {
      opacity: 0.62;
      transform: scale(0.992);
      transition: opacity 900ms ease, transform 900ms ease;
    }

    .shell.is-paused-muted .topbar {
      opacity: 0.36;
      transition: opacity 900ms ease;
    }

    .shell.is-paused-muted .queue-strip {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 900ms ease, transform 900ms ease;
    }

    .shell[data-burnin-phase="1"] .stage {
      transform: translate3d(0.4vw, -0.35vh, 0);
    }

    .shell[data-burnin-phase="2"] .stage {
      transform: translate3d(-0.35vw, 0.4vh, 0);
    }

    .queue-strip {
      justify-self: center;
      width: min(940px, 82vw);
      min-height: 8vh;
      padding: 1.25vh 1.25vw;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1.2vw;
      align-items: center;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.30), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .queue-label {
      color: var(--text-muted);
      font-size: 1.15vh;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #up-next-list {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 1.15vw;
      overflow: hidden;
    }

    .queue-item {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 0.55vw;
      color: var(--text-soft);
      font-size: 1.5vh;
      white-space: nowrap;
    }

    .queue-index {
      color: var(--green);
      font-family: var(--font-display);
      font-size: 1.65vh;
      letter-spacing: 0;
      opacity: 0.9;
    }

    .queue-copy {
      min-width: 0;
      display: flex;
      gap: 0.35vw;
      overflow: hidden;
    }

    .queue-name,
    .queue-artist {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-name {
      color: var(--text);
      max-width: 17vw;
    }

    .queue-artist {
      color: var(--text-muted);
      max-width: 11vw;
    }

    .queue-empty {
      color: var(--text-muted);
      font-size: 1.45vh;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #debug-toggle {
      position: fixed;
      right: 2vw;
      bottom: 2vh;
      z-index: 50;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 0.85vh 0.9vw;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.032);
      border: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 1.15vh;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 220ms ease, transform 220ms ease, border-color 220ms ease;
      pointer-events: none;
    }

    body.debug-access-visible #debug-toggle,
    body.debug-panel-open #debug-toggle {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #debug-toggle:focus-visible {
      outline: 2px solid rgba(45, 212, 191, 0.72);
      outline-offset: 4px;
    }

    .debug-panel {
      position: fixed;
      left: 2vw;
      right: 2vw;
      bottom: 6.2vh;
      max-height: 28vh;
      padding: 1.4vh 1.2vw;
      overflow-y: auto;
      z-index: 49;
      border-radius: 22px;
      color: var(--text-soft);
      background: rgba(4, 2, 14, 0.76);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1.2vh;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .debug-panel.is-hidden {
      display: none;
    }

    .debug-panel .err { color: #ff8f8f; }
    .debug-panel .warn { color: #f9dc7b; }
    .debug-panel .ok { color: #9ce5bd; }

    @keyframes receiver-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes receiver-pulse {
      0%, 100% {
        opacity: 0.65;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes receiver-shimmer {
      0% {
        transform: translateX(-110%);
      }

      100% {
        transform: translateX(310%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-aspect-ratio: 16/10) {
      .shell {
        padding: 4vh 4vw;
      }

      .stage {
        grid-template-columns: 1fr;
        gap: 3vh;
      }

      .cover-wrap {
        width: min(44vh, 62vw);
        justify-self: center;
      }

      .content {
        justify-self: center;
        width: min(820px, 86vw);
        text-align: center;
      }

      .kicker {
        justify-content: center;
      }

      #track-title {
        -webkit-line-clamp: 2;
      }
    }
  </style>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <audio id="aurora-cast-media" preload="auto" aria-hidden="true"></audio>
  <img id="ambient-art" class="ambient-art" alt="" aria-hidden="true" />

  <div class="shell" id="receiver-shell" data-player-state="APP_LOADING" data-burnin-phase="0">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <div class="brand-title">Aurora</div>
          <div class="brand-subtitle">Cast Receiver</div>
        </div>
      </div>

      <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-chip">Idle</span>
      </div>
    </header>

    <main class="stage">
      <section class="cover-wrap" aria-label="Album artwork">
        <div class="cover">
          <img id="cover-art" alt="" />
          <div id="cover-fallback">A</div>
        </div>
      </section>

      <section class="content" aria-label="Now playing">
        <div class="kicker">
          <span class="kicker-line" aria-hidden="true"></span>
          <span id="meta-kicker">Ready for playback</span>
        </div>
        <h1 id="track-title">Aurora Receiver</h1>
        <p id="track-artist">Starting Cast session</p>
        <p id="track-album">Preparing the Aurora receiver.</p>

        <div class="state-banner is-visible" id="state-banner" data-state="APP_LOADING" aria-live="polite">
          <span class="state-spinner" aria-hidden="true"></span>
          <span id="state-banner-text">Starting receiver</span>
        </div>
        <div class="idle-tip" id="idle-tip">Connect from Aurora to start playback.</div>

        <div class="progress">
          <div class="progress-times">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
          </div>
          <div class="progress-track" id="progress-bar"></div>
        </div>
      </section>
    </main>

    <aside class="queue-strip" aria-label="Up next">
      <div class="queue-label">Up Next</div>
      <div id="up-next-list">
        <div class="queue-empty">Queue appears here once playback starts.</div>
      </div>
    </aside>
  </div>

  <button id="debug-toggle" type="button">Diagnostics</button>
  <div id="debug-panel" class="debug-panel is-hidden"></div>

  <script>
    var _rawPanel = document.getElementById('debug-panel');
    function _rawLog(msg) {
      if (!_rawPanel) return;
      document.body.classList.add('debug-access-visible', 'debug-panel-open');
      _rawPanel.classList.remove('is-hidden');
      var el = document.createElement('div');
      el.className = 'err';
      el.textContent = msg;
      _rawPanel.appendChild(el);
      _rawPanel.scrollTop = _rawPanel.scrollHeight;
    }
    window.onerror = function(msg, src, line, col, err) {
      _rawLog('[FATAL] ' + msg + ' (' + src + ':' + line + ':' + col + ')');
      if (err && err.stack) _rawLog('[STACK] ' + err.stack);
      return false;
    };

    try {
      var LOG_TAG = 'NorthernLights';
      var FORCED_CAST_CODEC = 'aac';

      var context = cast.framework.CastReceiverContext.getInstance();
      var playerManager = context.getPlayerManager();
      var queueManager = playerManager.getQueueManager();

      var ui = {
        shell: document.getElementById('receiver-shell'),
        title: document.getElementById('track-title'),
        artist: document.getElementById('track-artist'),
        album: document.getElementById('track-album'),
        coverArt: document.getElementById('cover-art'),
        coverFallback: document.getElementById('cover-fallback'),
        currentTime: document.getElementById('current-time'),
        durationTime: document.getElementById('duration-time'),
        progressBar: document.getElementById('progress-bar'),
        statusChip: document.getElementById('status-chip'),
        stateBanner: document.getElementById('state-banner'),
        stateBannerText: document.getElementById('state-banner-text'),
        idleTip: document.getElementById('idle-tip'),
        metaKicker: document.getElementById('meta-kicker'),
        upNextList: document.getElementById('up-next-list'),
        debugPanel: document.getElementById('debug-panel'),
        debugToggle: document.getElementById('debug-toggle'),
        ambientArt: document.getElementById('ambient-art'),
        mediaElement: document.getElementById('aurora-cast-media')
      };

      var MAX_LINES = 80;
      var VERBOSE_NETWORK_LOGS = false;
      var receiverDiagnosticsVerbose = false;
      var UI_PROGRESS_INTERVAL_MS = 2000;
      var BUFFERING_BANNER_DELAY_MS = 900;
      var PAUSED_FADE_MS = 5 * 1000;
      var IDLE_STOP_MS = 5 * 60 * 1000;
      var PAUSED_STOP_MS = 20 * 60 * 1000;
      var BURNIN_SHIFT_MS = 60 * 1000;
      var IDLE_TIP_MS = 45 * 1000;
      var IDLE_TIPS = [
        'Connect from Aurora to start playback.',
        'Open Aurora on your phone to control this receiver.',
        'Queue changes appear here without interrupting playback.',
        'Aurora is ready on this screen.'
      ];
      var currentAuthToken = '';
      var currentPlayerState = 'APP_LOADING';
      var stateEnteredAt = Date.now();
      var lastBurninShiftAt = Date.now();
      var lastTipAt = Date.now();
      var burninPhase = 0;
      var currentTipIndex = 0;
      var pendingMediaInfo = null;
      var receiverStopReason = '';
      var lastPlaybackActivityAt = Date.now();
      var dimmedLogged = false;
      var lastRender = {
        title: '',
        artist: '',
        album: '',
        imageUrl: '',
        currentSecond: -1,
        durationSecond: -1,
        progressBucket: -1,
        statusCopy: '',
        bannerCopy: '',
        idleTip: '',
        burninPhase: -1,
        queueKey: ''
      };

      function log(level, tag, msg) {
        var ts = ((performance.now() / 1000).toFixed(1));
        var cls = level === 'error' ? 'err' : level === 'warn' ? 'warn' : 'ok';
        var panelHidden = !ui.debugPanel || ui.debugPanel.classList.contains('is-hidden');

        // Keep OK-level request chatter out of the DOM unless the panel is open.
        // DOM logging on Cast devices is surprisingly expensive and can stall the receiver UI.
        if (panelHidden && level === 'ok') return;

        var line = document.createElement('div');
        line.className = cls;
        line.textContent = '[' + ts + 's] [' + tag + '] ' + msg;
        ui.debugPanel.appendChild(line);
        while (ui.debugPanel.children.length > MAX_LINES) {
          ui.debugPanel.removeChild(ui.debugPanel.firstChild);
        }
        ui.debugPanel.scrollTop = ui.debugPanel.scrollHeight;
      }

      function setDebugVisible(visible) {
        if (!ui.debugPanel) return;
        ui.debugPanel.classList.toggle('is-hidden', !visible);
        document.body.classList.toggle('debug-panel-open', visible);
        if (visible) {
          document.body.classList.add('debug-access-visible');
        }
      }

      function setDebugAccessVisible(visible) {
        document.body.classList.toggle('debug-access-visible', Boolean(visible));
        if (!visible) {
          setDebugVisible(false);
        }
      }

      ui.debugToggle.addEventListener('click', function() {
        setDebugVisible(ui.debugPanel.classList.contains('is-hidden'));
      });

      function postServerLog(level, message, detail) {
        if (!currentAuthToken) return;
        try {
          fetch('/api/cast/log?token=' + encodeURIComponent(currentAuthToken), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              source: 'cast-receiver',
              session: FORCED_CAST_CODEC,
              level: level,
              message: message,
              detail: detail || ''
            })
          }).catch(function() {});
        } catch (e) {}
      }

      function safeLogValue(value) {
        return String(value || '')
          .replace(/([?&]token=)[^&\s]+/gi, '$1[redacted]')
          .replace(/Bearer\s+[A-Za-z0-9._-]+/g, 'Bearer [redacted]')
          .replace(/"token"\s*:\s*"[^"]+"/g, '"token":"[redacted]"')
          .replace(/eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+/g, '[jwt-redacted]');
      }

      function safeStringify(value) {
        var seen = [];
        try {
          var serialized = JSON.stringify(value, function(key, val) {
            if (typeof val === 'function') return undefined;
            if (val instanceof Error) {
              return {
                name: val.name,
                message: val.message,
                stack: val.stack,
                code: val.code,
                category: val.category,
                severity: val.severity,
                data: val.data
              };
            }
            if (val && typeof val === 'object') {
              if (seen.indexOf(val) >= 0) return '[Circular]';
              seen.push(val);
            }
            return val;
          });
          return (serialized || String(value)).slice(0, 2500);
        } catch (e) {
          try {
            return String(value);
          } catch (stringError) {
            return 'Unserializable error';
          }
        }
      }

      function logAndPost(level, tag, msg) {
        log(level, tag, msg);
        if (level !== 'ok' || VERBOSE_NETWORK_LOGS) {
          postServerLog(level, '[' + tag + '] ' + msg);
        }
      }

      function postDiagnosticMarker(marker, detail) {
        log('ok', LOG_TAG, marker + (detail ? ': ' + detail : ''));
        postServerLog('ok', '[' + LOG_TAG + '] ' + marker, detail || '');
      }

      function suppressDefaultCastUi() {
        var defaultPlayer = document.querySelector('cast-media-player');
        var mediaElement = ui.mediaElement;
        [defaultPlayer, mediaElement].forEach(function(element) {
          if (!element) return;
          element.setAttribute('aria-hidden', 'true');
          element.removeAttribute('controls');
          element.style.setProperty('left', '-10000px', 'important');
          element.style.setProperty('top', '-10000px', 'important');
          element.style.setProperty('width', '1px', 'important');
          element.style.setProperty('height', '1px', 'important');
          element.style.setProperty('opacity', '0', 'important');
          element.style.setProperty('pointer-events', 'none', 'important');
          element.style.setProperty('z-index', '-1', 'important');
          element.style.setProperty('overflow', 'hidden', 'important');
          element.style.setProperty('clip-path', 'inset(50%)', 'important');
        });
      }

      function withAuth(url) {
        if (!url) return url;
        try {
          var parsed = new URL(url, window.location.href);
          if (currentAuthToken && !parsed.searchParams.has('token')) {
            parsed.searchParams.set('token', currentAuthToken);
          }
          return parsed.toString();
        } catch (e) {
          return url;
        }
      }

      function applyAuth(requestInfo, resourceType) {
        if (!requestInfo) return;
        requestInfo.url = withAuth(requestInfo.url);
        requestInfo.headers = requestInfo.headers || {};
        if (currentAuthToken && !requestInfo.headers.Authorization) {
          requestInfo.headers.Authorization = 'Bearer ' + currentAuthToken;
        }
        if (VERBOSE_NETWORK_LOGS) {
          logAndPost('ok', LOG_TAG, resourceType + ' request');
        }
      }

      function formatTime(value) {
        if (!isFinite(value) || value < 0) return '0:00';
        var totalSeconds = Math.floor(value);
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return minutes + ':' + String(seconds).padStart(2, '0');
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function setPlayerState(nextState) {
        if (!nextState) return;
        if (currentPlayerState !== nextState) {
          var previousState = currentPlayerState;
          currentPlayerState = nextState;
          stateEnteredAt = Date.now();
          lastPlaybackActivityAt = stateEnteredAt;
          dimmedLogged = false;
          if (nextState === 'PLAYING' || nextState === 'LOADING') {
            receiverStopReason = '';
          }
          postDiagnosticMarker('receiver-state', 'from=' + previousState + ' to=' + nextState);
        }
      }

      function getMetadata(mediaInfo) {
        return (mediaInfo && mediaInfo.metadata) || {};
      }

      function getActiveMediaInfo() {
        var mediaInfo = playerManager.getMediaInformation();
        if (mediaInfo) return mediaInfo;
        return pendingMediaInfo;
      }

      function getImageUrl(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        if (metadata && metadata.images && metadata.images.length && metadata.images[0] && metadata.images[0].url) {
          return metadata.images[0].url;
        }
        return '';
      }

      function getDisplayTitle(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        return metadata.title || 'Unknown Title';
      }

      function getDisplayArtist(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        return metadata.artist || 'Unknown Artist';
      }

      function getDisplayAlbum(mediaInfo) {
        var metadata = getMetadata(mediaInfo);
        return metadata.albumName || '';
      }

      function setArtwork(imageUrl, title) {
        if (lastRender.imageUrl === imageUrl) return;
        lastRender.imageUrl = imageUrl;

        if (imageUrl) {
          ui.coverArt.src = imageUrl;
          if (ui.ambientArt) ui.ambientArt.src = imageUrl;
          document.body.classList.add('has-art');
          ui.coverArt.style.display = 'block';
          ui.coverFallback.style.display = 'none';
        } else {
          ui.coverArt.removeAttribute('src');
          if (ui.ambientArt) ui.ambientArt.removeAttribute('src');
          document.body.classList.remove('has-art');
          ui.coverArt.style.display = 'none';
          ui.coverFallback.textContent = (title || 'A').trim().charAt(0).toUpperCase() || 'A';
          ui.coverFallback.style.display = 'flex';
        }
      }

      function getStatusCopy() {
        if (currentPlayerState === 'APP_LOADING') return 'Starting';
        if (currentPlayerState === 'ERROR') return 'Needs attention';
        if (currentPlayerState === 'SEEKING') return 'Seeking';
        if (currentPlayerState === 'BUFFERING') return 'Buffering';
        if (currentPlayerState === 'PLAYING') return 'Playing';
        if (currentPlayerState === 'PAUSED') return 'Paused';
        if (currentPlayerState === 'LOADING') return 'Loading';
        return 'Idle';
      }

      function getBannerCopy(statusCopy) {
        if (statusCopy === 'Starting') return 'Starting receiver';
        if (statusCopy === 'Needs attention') return 'Playback problem. Check diagnostics.';
        if (statusCopy === 'Loading') return 'Loading track';
        if (statusCopy === 'Buffering') return 'Buffering';
        if (statusCopy === 'Seeking') return 'Seeking';
        if (statusCopy === 'Paused') return 'Paused';
        if (statusCopy === 'Idle') return 'Ready for playback';
        return '';
      }

      function getMetaKickerCopy(statusCopy) {
        if (statusCopy === 'Playing') return 'Now streaming';
        if (statusCopy === 'Buffering') return 'Buffering';
        if (statusCopy === 'Seeking') return 'Seeking';
        if (statusCopy === 'Paused') return 'Paused';
        if (statusCopy === 'Starting') return 'Starting';
        if (statusCopy === 'Needs attention') return 'Error';
        return 'Ready';
      }

      function buildQueueKey(items, currentIndex) {
        var parts = [String(currentIndex), String(items.length)];
        for (var i = currentIndex + 1; i < items.length && parts.length < 8; i += 1) {
          var mediaInfo = items[i].media || {};
          var metadata = getMetadata(mediaInfo);
          parts.push(String(items[i].itemId || i));
          parts.push(metadata.title || '');
          parts.push(metadata.artist || '');
        }
        return parts.join('|');
      }

      function renderQueue() {
        var items = queueManager ? queueManager.getItems() : [];
        var currentIndex = queueManager ? queueManager.getCurrentItemIndex() : -1;
        var queueKey = buildQueueKey(items, currentIndex);
        var nextItems = [];
        var i;

        if (lastRender.queueKey === queueKey) return;
        lastRender.queueKey = queueKey;

        for (i = currentIndex + 1; i < items.length && nextItems.length < 3; i += 1) {
          nextItems.push(items[i]);
        }

        ui.upNextList.innerHTML = '';

        if (!nextItems.length) {
          var empty = document.createElement('div');
          empty.className = 'queue-empty';
          empty.textContent = items.length ? 'No further tracks queued.' : 'Queue appears here once playback starts.';
          ui.upNextList.appendChild(empty);
          return;
        }

        nextItems.forEach(function(item, offset) {
          var mediaInfo = item.media || {};
          var row = document.createElement('div');
          row.className = 'queue-item';
          row.innerHTML =
            '<div class="queue-index">' + String(currentIndex + offset + 2).padStart(2, '0') + '</div>' +
            '<div class="queue-copy">' +
              '<div class="queue-name"></div>' +
              '<div class="queue-artist"></div>' +
            '</div>';
          row.querySelector('.queue-name').textContent = getDisplayTitle(mediaInfo);
          row.querySelector('.queue-artist').textContent = 'by ' + getDisplayArtist(mediaInfo);
          ui.upNextList.appendChild(row);
        });
      }

      function syncUi(force) {
        var now = Date.now();
        var mediaInfo = getActiveMediaInfo();
        var hasMedia = Boolean(mediaInfo);
        var title = hasMedia ? getDisplayTitle(mediaInfo) : 'Aurora Receiver';
        var artist = hasMedia ? getDisplayArtist(mediaInfo) : 'Waiting for media';
        var album = hasMedia ? getDisplayAlbum(mediaInfo) : 'Start casting from Aurora.';
        var imageUrl = hasMedia ? getImageUrl(mediaInfo) : '';
        var currentTime = playerManager.getCurrentTimeSec ? playerManager.getCurrentTimeSec() : 0;
        var duration = playerManager.getDurationSec ? playerManager.getDurationSec() : NaN;
        var progress = (!isFinite(duration) || duration <= 0) ? 0 : clamp((currentTime / duration) * 100, 0, 100);
        var statusCopy = getStatusCopy();
        var currentSecond = Math.floor(currentTime || 0);
        var durationSecond = Math.floor(duration || 0);
        var progressBucket = Math.floor(progress * 4); // quarter-percent buckets
        var bannerCopy = getBannerCopy(statusCopy);
        var stateAge = now - stateEnteredAt;
        var isIdle = currentPlayerState === 'IDLE';
        var isPaused = currentPlayerState === 'PAUSED';
        var showBufferingBanner = currentPlayerState !== 'BUFFERING' || stateAge >= BUFFERING_BANNER_DELAY_MS;
        var shouldPausedMute = isPaused && stateAge >= PAUSED_FADE_MS;
        var shouldDim = (isIdle || isPaused) && stateAge >= Math.min(IDLE_STOP_MS, PAUSED_STOP_MS);

        if (currentPlayerState === 'BUFFERING' && !showBufferingBanner) {
          bannerCopy = '';
        }

        if ((isIdle || isPaused) && now - lastBurninShiftAt >= BURNIN_SHIFT_MS) {
          lastBurninShiftAt = now;
          burninPhase = (burninPhase + 1) % 3;
        }

        if (isIdle && now - lastTipAt >= IDLE_TIP_MS) {
          lastTipAt = now;
          currentTipIndex = (currentTipIndex + 1) % IDLE_TIPS.length;
        }

        if (!receiverStopReason && isIdle && stateAge >= IDLE_STOP_MS) {
          receiverStopReason = 'idle-timeout';
          postDiagnosticMarker('receiver-idle-timeout', 'state=IDLE timeoutMs=' + IDLE_STOP_MS);
          context.stop();
          return;
        }

        if (!receiverStopReason && isPaused && stateAge >= PAUSED_STOP_MS) {
          receiverStopReason = 'paused-timeout';
          postDiagnosticMarker(
            'receiver-paused-timeout',
            'state=PAUSED timeoutMs=' + PAUSED_STOP_MS + ' position=' + Math.floor(currentTime || 0)
          );
          context.stop();
          return;
        }

        ui.shell.dataset.playerState = currentPlayerState;
        ui.shell.dataset.burninPhase = String((isIdle || isPaused) ? burninPhase : 0);
        ui.shell.classList.toggle('is-dimmed', shouldDim);
        ui.shell.classList.toggle('is-paused-muted', shouldPausedMute);
        if (shouldDim && !dimmedLogged) {
          dimmedLogged = true;
          postServerLog('ok', '[' + LOG_TAG + '] Receiver idle dim enabled', 'state=' + currentPlayerState);
        }

        if (force || lastRender.title !== title) {
          ui.title.textContent = title || 'Aurora Receiver';
          lastRender.title = title;
        }
        if (force || lastRender.artist !== artist) {
          ui.artist.textContent = artist || 'Waiting for media';
          lastRender.artist = artist;
        }
        if (force || lastRender.album !== album) {
          ui.album.textContent = album || 'Start casting from Aurora.';
          lastRender.album = album;
        }

        if (force || lastRender.currentSecond !== currentSecond) {
          ui.currentTime.textContent = formatTime(currentTime);
          lastRender.currentSecond = currentSecond;
        }
        if (force || lastRender.durationSecond !== durationSecond) {
          ui.durationTime.textContent = formatTime(duration);
          lastRender.durationSecond = durationSecond;
        }
        if (force || lastRender.progressBucket !== progressBucket) {
          ui.progressBar.style.setProperty('--progress', progress.toFixed(2) + '%');
          lastRender.progressBucket = progressBucket;
        }
        if (force || lastRender.statusCopy !== statusCopy) {
          lastPlaybackActivityAt = Date.now();
          dimmedLogged = false;
          ui.shell.classList.remove('is-dimmed');
          ui.statusChip.textContent = statusCopy;
          ui.metaKicker.textContent = getMetaKickerCopy(statusCopy);
          lastRender.statusCopy = statusCopy;
        }
        if (force || lastRender.bannerCopy !== bannerCopy) {
          ui.stateBannerText.textContent = bannerCopy || '';
          ui.stateBanner.dataset.state = currentPlayerState;
          ui.stateBanner.classList.toggle('is-visible', Boolean(bannerCopy));
          lastRender.bannerCopy = bannerCopy;
        }
        if (force || lastRender.idleTip !== IDLE_TIPS[currentTipIndex]) {
          ui.idleTip.textContent = IDLE_TIPS[currentTipIndex];
          lastRender.idleTip = IDLE_TIPS[currentTipIndex];
        }

        setArtwork(imageUrl, title);
        renderQueue();
      }

      function postReceiverHeartbeat(reason) {
        if (!currentAuthToken) return;
        try {
          var mediaInfo = playerManager.getMediaInformation();
          var title = getDisplayTitle(mediaInfo);
          var currentTime = playerManager.getCurrentTimeSec ? playerManager.getCurrentTimeSec() : 0;
          var duration = playerManager.getDurationSec ? playerManager.getDurationSec() : 0;
          postServerLog(
            'ok',
            '[' + LOG_TAG + '] Receiver heartbeat: ' + reason,
            'state=' + currentPlayerState +
              ' title=' + title +
              ' time=' + Math.floor(currentTime || 0) +
              ' duration=' + Math.floor(duration || 0) +
              ' overlay=active'
          );
        } catch (e) {
          postServerLog('warn', '[' + LOG_TAG + '] Receiver heartbeat failed', safeStringify(e));
        }
      }

      var playbackConfig = new cast.framework.PlaybackConfig();
      playbackConfig.manifestRequestHandler = function(requestInfo) {
        applyAuth(requestInfo, 'Manifest');
      };
      playbackConfig.segmentRequestHandler = function(requestInfo) {
        applyAuth(requestInfo, 'Segment');
      };
      playbackConfig.manifestHandler = function(manifest, responseInfo) {
        if (VERBOSE_NETWORK_LOGS) {
          var detail = responseInfo && responseInfo.headers ? ' headers received' : ' response received';
          logAndPost('ok', LOG_TAG, 'Manifest' + detail);
        }
        return manifest;
      };
      playbackConfig.segmentHandler = function(segment, responseInfo) {
        if (VERBOSE_NETWORK_LOGS) {
          var detail = responseInfo && responseInfo.headers ? ' headers received' : ' response received';
          logAndPost('ok', LOG_TAG, 'Segment' + detail);
        }
        return segment;
      };

      context.addEventListener(cast.framework.system.EventType.READY, function() {
        suppressDefaultCastUi();
        logAndPost('ok', LOG_TAG, 'Receiver started, forced codec: ' + FORCED_CAST_CODEC);
        // Post the device's own claims about lossless progressive support, so
        // SRC_NOT_SUPPORTED (104) failures can be told apart from fetch-level
        // problems: if the platform says "no flac" here, it rejects the source
        // without ever hitting the network.
        try {
          var audioProbe = document.createElement('audio');
          var canDisplay = function(mime) {
            try {
              return context.canDisplayType && context.canDisplayType(mime) ? 'yes' : 'no';
            } catch (probeError) {
              return 'err';
            }
          };
          var caps = [
            'playFlac=' + (audioProbe.canPlayType('audio/flac') || 'no'),
            'playXFlac=' + (audioProbe.canPlayType('audio/x-flac') || 'no'),
            'playWav=' + (audioProbe.canPlayType('audio/wav') || 'no'),
            'displayFlac=' + canDisplay('audio/flac'),
            'displayWav=' + canDisplay('audio/wav'),
            'mseFmp4Flac=' + (window.MediaSource && MediaSource.isTypeSupported('audio/mp4; codecs="flac"') ? 'yes' : 'no')
          ];
          postDiagnosticMarker('receiver-media-caps', caps.join(' '));
        } catch (capsError) {
          postDiagnosticMarker('receiver-media-caps', 'probe-failed');
        }
        setPlayerState('IDLE');
        syncUi(true);
      });

      context.addEventListener(cast.framework.system.EventType.ERROR, function(e) {
        setDebugVisible(true);
        suppressDefaultCastUi();
        setPlayerState('ERROR');
        logAndPost('error', LOG_TAG, 'Receiver error: ' + safeStringify(e));
        syncUi(true);
      });

      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        function(loadRequestData) {
          function normalizeMedia(media) {
            if (!media) return;
            currentAuthToken = (media.customData && media.customData.token) || currentAuthToken || '';
            if (media.customData && typeof media.customData.diagnosticsVerbose === 'boolean') {
              var nextDiagnosticsVerbose = media.customData.diagnosticsVerbose;
              if (receiverDiagnosticsVerbose !== nextDiagnosticsVerbose || VERBOSE_NETWORK_LOGS !== nextDiagnosticsVerbose) {
                receiverDiagnosticsVerbose = nextDiagnosticsVerbose;
                VERBOSE_NETWORK_LOGS = nextDiagnosticsVerbose;
                setDebugAccessVisible(receiverDiagnosticsVerbose);
                postDiagnosticMarker('receiver-diagnostics-verbosity', 'enabled=' + receiverDiagnosticsVerbose);
              }
            }

            // Empty or mpegurl contentType => HLS (forced AAC/TS). A progressive
            // lossless load (audio/flac, audio/wav) sets a real audio MIME and must
            // pass straight to the platform player — don't rewrite codec or format.
            var isHls = !media.contentType || media.contentType.indexOf('mpegurl') >= 0;
            if (media.contentId) {
              try {
                var urlObj = new URL(media.contentId, window.location.href);
                if (isHls) {
                  urlObj.searchParams.set('codec', FORCED_CAST_CODEC);
                }
                // Token must ride in the URL: the platform <audio> element fetches
                // contentId directly (Shaka request handlers don't apply to progressive).
                if (currentAuthToken && !urlObj.searchParams.has('token')) {
                  urlObj.searchParams.set('token', currentAuthToken);
                }
                media.contentId = urlObj.toString();
              } catch (e) {
                logAndPost('error', LOG_TAG, 'Failed to parse contentId URL');
              }
            }

            media.contentType = media.contentType || 'application/vnd.apple.mpegurl';
            media.streamType = media.streamType || cast.framework.messages.StreamType.BUFFERED;
            if (media.contentType.indexOf('mpegurl') >= 0 && cast.framework.messages.HlsSegmentFormat) {
              media.hlsSegmentFormat = cast.framework.messages.HlsSegmentFormat.TS;
            }
          }

          if (loadRequestData.media) {
            normalizeMedia(loadRequestData.media);
            pendingMediaInfo = loadRequestData.media;
            logAndPost('ok', LOG_TAG, 'Prepared media for playback');
            logAndPost('ok', LOG_TAG, 'LOAD contentId: ' + safeLogValue(loadRequestData.media.contentId));
            logAndPost('ok', LOG_TAG, 'LOAD contentType: ' + loadRequestData.media.contentType);
          }

          if (loadRequestData.queueData && loadRequestData.queueData.items) {
            loadRequestData.queueData.items.forEach(function(item) {
              if (item && item.media) normalizeMedia(item.media);
            });
            logAndPost('ok', LOG_TAG, 'LOAD queue items: ' + loadRequestData.queueData.items.length);
          }

          setPlayerState('LOADING');
          lastRender.queueKey = '';
          suppressDefaultCastUi();
          postReceiverHeartbeat('load');
          syncUi(true);
          return loadRequestData;
        }
      );

      function decodeError(e) {
        if (!e) return 'Unknown error';
        var detail = [];
        function add(label, value) {
          if (value === undefined || value === null || value === '') return;
          detail.push(label + '=' + value);
        }

        add('code', e.detailedErrorCode);
        if (e.reason) add('reason', e.reason);
        if (e.error) {
          var err = e.error;
          add('message', err.message);
          add('shaka', err.code);
          add('category', err.category);
          add('severity', err.severity);
          if (err.data) add('data', safeStringify(err.data));
        }
        if (e.mediaError) add('mediaError', safeStringify(e.mediaError));
        if (!detail.length) add('event', safeStringify(e));
        return detail.join(' ');
      }

      playerManager.addEventListener(
        cast.framework.events.EventType.ERROR,
        function(e) {
          setPlayerState('ERROR');
          setDebugVisible(true);
          suppressDefaultCastUi();
          logAndPost('error', LOG_TAG, 'Player error: ' + decodeError(e));
          syncUi(true);
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.BUFFERING,
        function(e) {
          if (e.isBuffering) {
            setPlayerState('BUFFERING');
          } else {
            var resumedState = playerManager.getPlayerState ? playerManager.getPlayerState() : 'PLAYING';
            setPlayerState(resumedState || 'PLAYING');
          }
          suppressDefaultCastUi();
          logAndPost('ok', LOG_TAG, 'Buffering: ' + e.isBuffering);
          syncUi(true);
        }
      );

      if (cast.framework.events.EventType.SEEKING) {
        playerManager.addEventListener(
          cast.framework.events.EventType.SEEKING,
          function() {
            setPlayerState('SEEKING');
            suppressDefaultCastUi();
            logAndPost('ok', LOG_TAG, 'Seeking');
            syncUi(true);
          }
        );
      }

      playerManager.addEventListener(
        cast.framework.events.EventType.MEDIA_STATUS,
        function(e) {
          if (e.mediaStatus) {
            setPlayerState(e.mediaStatus.playerState || currentPlayerState);
            pendingMediaInfo = e.mediaStatus.media || pendingMediaInfo;
            logAndPost('ok', LOG_TAG, 'State: ' + e.mediaStatus.playerState +
              (e.mediaStatus.idleReason ? ' (' + e.mediaStatus.idleReason + ')' : ''));
            lastRender.queueKey = '';
            suppressDefaultCastUi();
            postReceiverHeartbeat('media-status');
            syncUi(true);
          }
        }
      );

      setInterval(function() {
        suppressDefaultCastUi();
        syncUi(false);
      }, UI_PROGRESS_INTERVAL_MS);

      setInterval(function() {
        if (currentPlayerState === 'PLAYING' || currentPlayerState === 'BUFFERING') {
          postReceiverHeartbeat('interval');
        }
      }, 60000);

      suppressDefaultCastUi();
      logAndPost('ok', LOG_TAG, 'Starting receiver...');
      if (ui.mediaElement) {
        playerManager.setMediaElement(ui.mediaElement);
      }
      var receiverOptions = new cast.framework.CastReceiverOptions();
      receiverOptions.playbackConfig = playbackConfig;
      receiverOptions.useShakaForHls = true;
      receiverOptions.skipMplLoad = true;
      if (ui.mediaElement) {
        receiverOptions.mediaElement = ui.mediaElement;
      }
      receiverOptions.supportedCommands =
        cast.framework.messages.Command.ALL_BASIC_MEDIA |
        cast.framework.messages.Command.QUEUE_NEXT |
        cast.framework.messages.Command.QUEUE_PREV;
      context.start(receiverOptions);
      logAndPost('ok', LOG_TAG, 'context.start() returned OK');
    } catch (initError) {
      _rawLog('[INIT ERROR] ' + initError.message);
      if (initError.stack) _rawLog('[INIT STACK] ' + initError.stack);
    }
  </script>
</body>
</html>
